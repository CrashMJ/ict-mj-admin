<div class="card card-custom gutter-b">
  <div class="card-header">
    <div class="card-title">
      <h3 class="card-label">Students List</h3>
    </div>
    <!-- <div class="card-toolbar">
      <a type="button" class="btn btn-primary" (click)="addNewStudent()"
        >New Student</a
      >
    </div> -->
  </div>
  <div class="col-lg-12 ml-5" style="width: 100%">
    <div class="row mt-2">
      <div class="col-lg-12">
        <h4 class="card-label">Filter</h4>
      </div>
      <div class="col-lg-12 row">
        <div class="col-lg-3">
          <label class="col-form-label">ID </label>
          <input
            class="form-control form-control-lg form-control-solid"
            name="id"
            #idSearch
            type="text"
            (keyup)="search('id', idSearch.value)"
          />
        </div>
        <div class="col-lg-3">
          <label class="col-form-label">Name </label>
          <input
            class="form-control form-control-lg form-control-solid"
            name="name"
            #nameSearch
            type="text"
            (keyup)="search('name', nameSearch.value)"
          />
        </div>
        <div class="col-lg-3">
          <label class="col-form-label">NIC </label>
          <input
            class="form-control form-control-lg form-control-solid"
            name="nic"
            #nicSearch
            type="text"
            (keyup)="search('nic', nicSearch.value)"
          />
        </div>
        <div class="col-lg-3">
          <label class="col-form-label">Phone </label>
          <input
            class="form-control form-control-lg form-control-solid"
            name="phone"
            #phoneSearch
            type="text"
            (keyup)="search('phone', phoneSearch.value)"
          />
        </div>
        <div class="col-lg-3">
          <label class="col-form-label">Email </label>
          <input
            class="form-control form-control-lg form-control-solid"
            name="email"
            #emailSearch
            type="text"
            (keyup)="search('email', emailSearch.value)"
          />
        </div>
        <!-- <div class="col-lg-3">
          <label class="col-form-label">District </label>
          <select
            class="form-control form-control-lg form-control-solid"
            name="district"
            #districtSearch
            (change)="search('district', districtSearch.value)"
          >
            <option disabled>District</option>
            <option></option>
            <option
              *ngFor="let district of districts"
              value="{{ district.name_en }}"
            >
              {{ district.name_en }}
            </option>
          </select>
        </div> -->
        <!-- <div class="col-lg-3">
                        <label class="col-form-label">Date </label>
                        <input class="form-control form-control-lg form-control-solid" name="created_at" #dateSearch type="date" (change)="search('created_at',dateSearch.value)" />
                    </div> -->
        <div class="col-lg-3">
          <label class="col-form-label">Status </label>
          <select
            class="form-control form-control-lg form-control-solid"
            name="status"
            #statusSearch
            type="text"
            (change)="search('status', statusSearch.value)"
          >
            <option></option>
            <option value="ACTIVE">ACTIVE</option>
            <option value="BLOCKED">BLOCKED</option>
          </select>
        </div>
        <!-- <div class="col-lg-1">
                    <label class="col-form-label"></label>
                    <a type="button" class="btn form-control form-control-lg btn-primary button-bottom" (click)="addNewAdmin()">Filter</a>
                 </div> -->
        <div class="col-lg-1 ml-1">
          <label class="col-form-label"></label>
          <a
            type="button"
            class="btn form-control form-control-lg form-control-solid button-bottom"
            (click)="
              idSearch.value = '';
              nameSearch.value = '';
              nicSearch.value = '';
              phoneSearch.value = '';
              emailSearch.value = '';
              statusSearch.value = '';
              clearFilter()
            "
            >Clear</a
          >
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <div class="table-responsive angular-bootstrap-table">
      <div class="mat-elevation-z8">
        <mat-table #table2 [dataSource]="dataSource">
          <ng-container matColumnDef="id">
            <mat-header-cell *matHeaderCellDef>ID </mat-header-cell>
            <mat-cell *matCellDef="let row">
              {{ row.id }}
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="name">
            <mat-header-cell *matHeaderCellDef>Name </mat-header-cell>
            <mat-cell *matCellDef="let row">
              {{ row.fname }} {{ row.lname }}
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="nic">
            <mat-header-cell *matHeaderCellDef>NIC </mat-header-cell>
            <mat-cell *matCellDef="let row">
              {{ row.nic }}
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="phone">
            <mat-header-cell *matHeaderCellDef>Phone </mat-header-cell>
            <mat-cell *matCellDef="let row">
              {{ row.phone }}
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="created_at">
            <mat-header-cell *matHeaderCellDef
              >Registered Date
            </mat-header-cell>
            <mat-cell *matCellDef="let row">
              {{ row.registered_date }}
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="status">
            <mat-header-cell *matHeaderCellDef>Status </mat-header-cell>
            <mat-cell *matCellDef="let row">
              <mat-chip-list aria-label="">
                <mat-chip color="accent" *ngIf="row.status == 'active'" selected
                  >ACTIVE</mat-chip
                >
                <mat-chip color="warn" *ngIf="row.status == 'blocked'" selected
                  >Blocked</mat-chip
                >
              </mat-chip-list>
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="is_phone_verified">
            <mat-header-cell *matHeaderCellDef
              >Is Phone Verified
            </mat-header-cell>
            <mat-cell *matCellDef="let row">
              <mat-chip-list aria-label="">
                <mat-chip
                  color="accent"
                  *ngIf="
                    row.is_phone_verified == true || row.is_phone_verified == 1
                  "
                  selected
                  >Yes</mat-chip
                >
                <mat-chip
                  color="warn"
                  *ngIf="
                    row.is_phone_verified == false || row.is_phone_verified == 0
                  "
                  selected
                  >No</mat-chip
                >
              </mat-chip-list>
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="otp">
            <mat-header-cell *matHeaderCellDef>OTP </mat-header-cell>
            <mat-cell *matCellDef="let row">
              {{ row.otp }}
            </mat-cell>
          </ng-container>
          <ng-container matColumnDef="action">
            <mat-header-cell *matHeaderCellDef>Action </mat-header-cell>
            <mat-cell *matCellDef="let row">
              <button
                mat-icon-button
                color="primary"
                type="button"
                [routerLink]="['/student/edit', row.id]"
                matTooltip="Edit"
              >
                <mat-icon>create</mat-icon></button
              >&nbsp;
              <button
                mat-icon-button
                color="warn"
                type="button"
                (click)="delete(row.id, row.name)"
                matTooltip="Delete"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </mat-cell>
          </ng-container>
          <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
          <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
        </mat-table>
        <mat-paginator
          [length]="pagination_data.total"
          [pageSizeOptions]="pagination_item_counts"
          (page)="pageEvent($event)"
          showFirstLastButtons
        ></mat-paginator>
      </div>
    </div>
  </div>
</div>
