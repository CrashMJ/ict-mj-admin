<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4" id="example-modal-sizes-title-lg">
            <h3>ADD NEW FAQ</h3>
            <ng-container>
                <div [formGroup]="formGroup">

                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Question</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="question_en" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Answer</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="answer_en" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label"> Image</label>
                        <div class="col-lg-11 col-xl-9">
                          <input
                            class="form-control form-control-lg form-control-solid"
                            type="file"
                            accept=".png, .jpg, .jpeg"
                            (change)="uploadFile('image', $event)"
                            formControlName="image"
                            [class.is-invalid]="isControlInvalid('image')"
                            [class.is-valid]="isControlValid('image')"
                          />
                        </div>
                      </div>
                </div>
            </ng-container>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()">Cancel</button>
        <ng-container>

            <button type="submit" class="btn btn-primary btn-elevate" (click)="save()" [disabled]="formGroup.invalid">Save</button>
        </ng-container>
    </div>
</div>
