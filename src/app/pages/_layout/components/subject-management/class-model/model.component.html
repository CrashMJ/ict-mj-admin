<div class="modal-content">
  <div class="modal-header">
    <div class="modal-title h4" id="example-modal-sizes-title-lg">
      <h3>{{classId ? "EDIT CLASS" : "ADD NEW CLASS" }} </h3>
      <ng-container>
        <!-- <ng-container >Edit</ng-container>
                      <ng-container >Create</ng-container>
                      customer -->
        <!-- <ng-container *ngIf="customer.id">'{{customer.firstName}} {{ customer.lastName }}'</ng-container> -->
        <div [formGroup]="formGroup">
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Module ID</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="number"
                formControlName="module_id"
                placeholder="Get module id from the modules tab and enter here. Only number"
                [class.is-invalid]="isControlInvalid('module_id')"
                [class.is-valid]="isControlValid('module_id')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Title</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="title"
                [class.is-invalid]="isControlInvalid('title')"
                [class.is-valid]="isControlValid('title')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Start Date</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="start_date"
                placeholder="Format: 2022-06-12"
                [class.is-invalid]="isControlInvalid('start_date')"
                [class.is-valid]="isControlValid('start_date')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Start Time</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="start_time"
                placeholder="Format: 10:30"
                [class.is-invalid]="isControlInvalid('start_time')"
                [class.is-valid]="isControlValid('start_time')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Description</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="description"
                [class.is-invalid]="isControlInvalid('description')"
                [class.is-valid]="isControlValid('description')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Zoom Link</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="zoom_link"
                [class.is-invalid]="isControlInvalid('zoom_link')"
                [class.is-valid]="isControlValid('zoom_link')"
              />
            </div>
          </div>

            <div class="form-group row"  *ngIf="classId">
            <label class="col-xl-3 col-lg-3 col-form-label">Recording Link</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="record_url"
                [class.is-invalid]="isControlInvalid('record_url')"
                [class.is-valid]="isControlValid('record_url')"
              />
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-light btn-elevate mr-2"
      (click)="modal.dismiss()"
    >
      Cancel
    </button>
    <ng-container>
      <button
        type="submit"
        class="btn btn-primary btn-elevate"
        (click)="save()"
        [disabled]="formGroup.invalid"
      >
      {{classId ? "Update" : "Save" }}
      </button>
    </ng-container>
  </div>
</div>
