<div class="modal-content">
  <div class="modal-header">
    <div class="modal-title h4" id="example-modal-sizes-title-lg">
      <h3>{{moduleId ? "EDIT MODULE" : "ADD NEW MODULE" }}</h3>
      <ng-container>
        <!-- <ng-container >Edit</ng-container>
                      <ng-container >Create</ng-container>
                      customer -->
        <!-- <ng-container *ngIf="customer.id">'{{customer.firstName}} {{ customer.lastName }}'</ng-container> -->
        <div [formGroup]="formGroup">
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Title</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="name_en"
                [class.is-invalid]="isControlInvalid('name_en')"
                [class.is-valid]="isControlValid('name_en')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Title Tag</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="title_tag_en"
                [class.is-invalid]="isControlInvalid('title_tag_en')"
                [class.is-valid]="isControlValid('title_tag_en')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label"
              >Module Number</label
            >
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="module_number"
                placeholder="Unique number, Eg: 1,2,3"
                [class.is-invalid]="isControlInvalid('module_number')"
                [class.is-valid]="isControlValid('module_number')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Module Code</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="module_code"
                placeholder="Unique code, Eg: AL2022M04"
                [class.is-invalid]="isControlInvalid('module_code')"
                [class.is-valid]="isControlValid('module_code')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Description</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="description_en"
                [class.is-invalid]="isControlInvalid('description_en')"
                [class.is-valid]="isControlValid('description_en')"
              />
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-light btn-elevate mr-2"
      (click)="modal.dismiss()"
    >
      Cancel
    </button>
    <ng-container>
      <button
        type="submit"
        class="btn btn-primary btn-elevate"
        (click)="save()"
        [disabled]="formGroup.invalid"
      >
      {{moduleId ? "Update" : "Save" }}
      </button>
    </ng-container>
  </div>
</div>
