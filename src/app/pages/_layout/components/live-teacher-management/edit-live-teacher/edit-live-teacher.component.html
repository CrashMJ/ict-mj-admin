<!--begin::Card-->
<div class="card card-custom gutter-b">
    <!--begin::Header-->
    <div class="card-header card-header-tabs-line">
        <ul class="nav nav-dark nav-bold nav-tabs nav-tabs-line" role="tablist">
            <li class="nav-item">
                <a (click)="setActiveTab(1)" class="nav-link cursor-pointer" [ngClass]="getActiveTabCSSClass(1)" role="tab">
                    Profile
                </a>
            </li>
            <li class="nav-item">
                <a (click)="setActiveTab(2)" class="nav-link cursor-pointer" [ngClass]="getActiveTabCSSClass(2)" role="tab">
                    Images
                </a>
            </li>
           
            <li class="nav-item">
                <a (click)="setActiveTab(3)" class="nav-link cursor-pointer" [ngClass]="getActiveTabCSSClass(3)" role="tab">
                    Classes
                </a>
            </li>
            <li class="nav-item">
                <a (click)="setActiveTab(6)" class="nav-link cursor-pointer" [ngClass]="getActiveTabCSSClass(6)" role="tab">
                    Reset Password
                </a>
            </li>
        </ul>
    </div>


    <div class="card-body">
        <div class="tab-content pt-3">
            <!-- begin::Header -->
            <div class="tab-pane" [ngClass]="getActiveTabCSSClass(1)">
                <div [formGroup]="formGroup" class="col-lg-6 col-lg-offset-3 card pt-3">
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Name</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="name" [class.is-invalid]="isControlInvalid('name')"
                                [class.is-valid]="isControlValid('name')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3  col-form-label">Email</label>
                        <div class="col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" disabled type="text" formControlName="email" [class.is-invalid]="isControlInvalid('email')"
                                [class.is-valid]="isControlValid('email')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3  col-form-label">Zoom Email</label>
                        <div class="col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="zoom_email" [class.is-invalid]="isControlInvalid('zoom_email')"
                                [class.is-valid]="isControlValid('zoom_email')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Address </label>
                        <div class="col-lg-11 col-xl-9 ">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="address" [class.is-invalid]="isControlInvalid('address')"
                                [class.is-valid]="isControlValid('address')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">NIC</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="nic" [class.is-invalid]="isControlInvalid('nic')"
                                [class.is-valid]="isControlValid('nic')" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Phone Number</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="phone" [class.is-invalid]="isControlInvalid('phone')"
                                [class.is-valid]="isControlValid('phone')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">City</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="city"  [class.is-invalid]="isControlInvalid('city')"
                            [class.is-valid]="isControlValid('city')"/>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">District</label>
                        <div class="col-lg-11 col-xl-9">
                            <select
							class="form-control"
							formControlName="district"
							required
							placeholder="Select District"
                            [class.is-invalid]="isControlInvalid('district')"
                            [class.is-valid]="isControlValid('district')"
						>
							<option value="">Select</option>
							<option value="Table" *ngFor="let district of districts" value="{{district.name_en}}">{{district.name_en}}</option>
						</select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">About </label>
                        <div class="col-lg-11 col-xl-9 ">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="about_you" [class.is-invalid]="isControlInvalid('about_you')"
                                [class.is-valid]="isControlValid('about_you')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Timetable </label>
                        <div class="col-lg-11 col-xl-9 ">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="time_table" [class.is-invalid]="isControlInvalid('time_table')"
                                [class.is-valid]="isControlValid('time_table')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-form-label">Subject</label>
                        <div class="col-lg-9">
                            <select formControlName="subject" class="form-control"
                                [class.is-invalid]="isControlInvalid('subject')"
                                [class.is-valid]="isControlValid('subject')">
                                <option disabled>Subjects</option>
                                <option value="{{subject.id}}" *ngFor="let subject of subjectObj">{{subject.title}}</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                      
                        <label class="col-xl-3 col-form-label">Class Type</label>
                        <div class="col-xl-9">
                            <select class="form-control form-control-lg form-control-solid" name="teacher_class" formControlName="teacher_class" [class.is-invalid]="isControlInvalid('teacher_class')"
                                [class.is-valid]="isControlValid('teacher_class')">
                                <option value="OL">OL</option>
                                <option value="AL">AL</option>
                                <option value="OTHER">OTHER</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                      
                        <label class="col-xl-3 col-form-label">Status</label>
                        <div class="col-xl-9">
                            <select class="form-control form-control-lg form-control-solid" name="status" formControlName="status" [class.is-invalid]="isControlInvalid('status')"
                                [class.is-valid]="isControlValid('status')">
                                <option value="PENDING">PENDING</option>
                                <option value="ACTIVE">ACTIVE</option>
                                <option value="BLOCKED">BLOCKED</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row pl-3 modal-footer">
                        <button type="submit" class="btn btn-primary btn-elevate" (click)="save()" [disabled]="formGroup.invalid">Update</button>
                    </div>
                </div>
            </div>
            <div class="tab-pane" [ngClass]="getActiveTabCSSClass(2)">
                <div class="col-lg-6 text-center card mb-4">
                    <div [formGroup]="formGroup31" class="col-lg-12 text-center mt-4" *ngIf="teacherResponse">
                        <h5 class="col-xl-12 col-lg-12 col-form-label">Profile Picture</h5>
                        <img src="{{STORAGE_BUCKET}}{{teacherResponse.profile}}" class="teacher-img" alt="">
                        <div class="form-group row">
                            <div class="col-lg-9 col-xl-9">
                                <input class="form-control form-control-lg form-control-solid" type="file" accept=".png, .jpg, .jpeg" (change)="uploadFile('profile_image',$event)"/>
                            </div>
                            <div class="col-lg-3 col-xl-3">
                                <button type="submit" class="btn btn-primary btn-elevate" (click)="updateProfileBanner()" [disabled]="formGroup31.invalid">Update</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 text-center card mb-4">
                    <div [formGroup]="formGroup32" class="col-lg-12 text-center mt-4" *ngIf="teacherResponse">
                        <h5 class="col-xl-12 col-lg-12 col-form-label">Desktop Banner</h5>
                        <img src="{{STORAGE_BUCKET}}{{teacherResponse.banner}}" class="teacher-img" alt="">
                        <div class="form-group row">
                           
                            <div class="col-lg-9 col-xl-9">
                                <input class="form-control form-control-lg form-control-solid" type="file" (change)="uploadFile('banner_image',$event)" accept=".png, .jpg, .jpeg"/>
                            </div>
                            <div class="col-lg-3 col-xl-3">
                                <button type="submit" class="btn btn-primary btn-elevate" (click)="updateDesktopBanner()" [disabled]="formGroup32.invalid">Update</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 text-center card mb-4">
                    <div [formGroup]="formGroup33" class="col-lg-12 text-center mt-4" *ngIf="teacherResponse">
                        <h5 class="col-xl-12 col-lg-12 col-form-label">NIC Side 1</h5>
                        <img src="{{STORAGE_BUCKET}}{{teacherResponse.nic_side_1}}" class="teacher-img" alt="">
                        <div class="form-group row">
                            <div class="col-lg-9 col-xl-9">
                                <input class="form-control form-control-lg form-control-solid" type="file" (change)="uploadFile('nic_side_1',$event)" accept=".png, .jpg, .jpeg"/>
                            </div>
                            <div class="col-lg-3 col-xl-3">
                                <button type="submit" class="btn btn-primary btn-elevate" (click)="updateNIC1()" [disabled]="formGroup33.invalid">Update</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 text-center card mb-4">
                    <div [formGroup]="formGroup33" class="col-lg-12 text-center mt-4" *ngIf="teacherResponse">
                        <h5 class="col-xl-12 col-lg-12 col-form-label">NIC Side 2</h5>
                        <img src="{{STORAGE_BUCKET}}{{teacherResponse.nic_side_2}}" class="teacher-img" alt="">
                        <div class="form-group row">
                            <div class="col-lg-9 col-xl-9">
                                <input class="form-control form-control-lg form-control-solid" type="file" (change)="uploadFile('nic_side_2',$event)" accept=".png, .jpg, .jpeg"/>
                            </div>
                            <div class="col-lg-3 col-xl-3">
                                <button type="submit" class="btn btn-primary btn-elevate" (click)="updateNIC2()" [disabled]="formGroup34.invalid">Update</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-pane" [ngClass]="getActiveTabCSSClass(3)">
                    <div class="mat-elevation-z8">
                        <mat-table #table1 [dataSource]="dataSource1">
                            <ng-container matColumnDef="id">
                                <mat-header-cell *matHeaderCellDef>ID </mat-header-cell>
                                <mat-cell *matCellDef="let row">
                                    {{ row.id }}
                                </mat-cell>
                            </ng-container>
                            <ng-container matColumnDef="topic">
                                <mat-header-cell *matHeaderCellDef>Title</mat-header-cell>
                                <mat-cell *matCellDef="let row">
                                    {{ row.topic }}
                                </mat-cell>
                            </ng-container>
                            <ng-container matColumnDef="fee">
                                <mat-header-cell *matHeaderCellDef>Fee</mat-header-cell>
                                <mat-cell *matCellDef="let row">
                                    {{ row.fee }}
                                </mat-cell>
                            </ng-container>
                            <ng-container matColumnDef="type">
                                <mat-header-cell *matHeaderCellDef>Type</mat-header-cell>
                                <mat-cell *matCellDef="let row">
                                    {{ row.type }}
                                </mat-cell>
                            </ng-container>
                            <ng-container matColumnDef="free_code">
                                <mat-header-cell *matHeaderCellDef>Code</mat-header-cell>
                                <mat-cell *matCellDef="let row">
                                    {{ row.free_code }}
                                </mat-cell>
                            </ng-container>
                         
                            <ng-container matColumnDef="status">
                                <mat-header-cell *matHeaderCellDef>Status </mat-header-cell>
                                <mat-cell *matCellDef="let row">
                                    {{ row.status }}
                                </mat-cell>
                                <mat-cell *matCellDef="let row">
                                    <mat-chip-list aria-label="">
                                        <mat-chip color="" *ngIf="row.status == 'PENDING'" selected>PENDING</mat-chip>
                                        <mat-chip color="accent" *ngIf="row.status == 'APPROVED'" selected>APPROVED</mat-chip>
                                        <mat-chip color="warn" *ngIf="row.status == 'REJECTED'" selected>REJECTED</mat-chip>
                                    </mat-chip-list>
                                </mat-cell>
                            </ng-container>
                            <ng-container matColumnDef="created_at">
                                <mat-header-cell *matHeaderCellDef>Created </mat-header-cell>
                                <mat-cell *matCellDef="let row">
                                    {{ row.updated_at }}
                                </mat-cell>
                            </ng-container>
                            <ng-container matColumnDef="action">
                                <mat-header-cell *matHeaderCellDef>Action </mat-header-cell>
                                <mat-cell *matCellDef="let row">
                                    <button
                                        mat-icon-button
                                        color="primary"
                                        type="button"
                                        [routerLink]="['/live-class/edit', row.id]"
                                        matTooltip="Edit"
                                    >
                                        <mat-icon>create</mat-icon></button
                                    >
                                </mat-cell>
                            </ng-container>
                            <mat-header-row
                                *matHeaderRowDef="displayedColumns1"
                            ></mat-header-row>
                            <mat-row
                                *matRowDef="let row; columns: displayedColumns1"
                            ></mat-row>
                        </mat-table>
                        <mat-paginator
                        [length]="pagination_data1.total"
                        [pageSizeOptions]="pagination_item_counts1"
                        (page)="pageEvent1($event)"
                        showFirstLastButtons
                    ></mat-paginator>
                </div>
            </div>
            <div class="tab-pane" [ngClass]="getActiveTabCSSClass(6)">
                <div [formGroup]="formGroup2" class="col-lg-6 col-lg-offset-3 card pt-3">
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">New Password</label>
                        <div class="col-lg-6 col-xl-6">
                            <input class="form-control form-control-lg form-control-solid" type="password" formControlName="password" />
                        </div>
                        <div class="col-lg-3 col-xl-3">
                            <button type="submit" class="btn btn-primary btn-elevate" (click)="updatePassword()" [disabled]="formGroup2.invalid">Update</button>
                        </div>
                    </div>
                  
                </div>
            </div>
        </div>
    </div>

    <!--end::Header-->
    <!--begin::Form-->
</div>
<!--end::Card-->
