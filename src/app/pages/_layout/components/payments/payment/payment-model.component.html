<div class="modal-content">
  <div class="modal-header">
    <div class="modal-title h4" id="example-modal-sizes-title-lg">
      <h3>ADD NEW PAYMENT</h3>
      <ng-container>
        <!-- <ng-container >Edit</ng-container>
                      <ng-container >Create</ng-container>
                      customer -->
        <!-- <ng-container *ngIf="customer.id">'{{customer.firstName}} {{ customer.lastName }}'</ng-container> -->
        <div [formGroup]="formGroup">
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">
              Payment Type</label
            >
            <div class="col-lg-11 col-xl-9">
              <select
                class="form-control form-control-lg form-control-solid"
                name="payment_type"
                formControlName="payment_type"
                [class.is-invalid]="isControlInvalid('payment_type')"
                [class.is-valid]="isControlValid('payment_type')"
              >
                <option value="bank">Bank</option>
                <option value="payhere">Payhere</option>
              </select>
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Amount</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="amount"
                [class.is-invalid]="isControlInvalid('amount')"
                [class.is-valid]="isControlValid('amount')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Bank Name</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="bank_name"
                [class.is-invalid]="isControlInvalid('bank_name')"
                [class.is-valid]="isControlValid('bank_name')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Branch Name</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="branch_name"
                [class.is-invalid]="isControlInvalid('branch_name')"
                [class.is-valid]="isControlValid('branch_name')"
              />
            </div>
          </div>

          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label"> Pay Level</label>
            <div class="col-lg-11 col-xl-9">
              <select
                class="form-control form-control-lg form-control-solid"
                name="pay_level"
                formControlName="pay_level"
                [class.is-invalid]="isControlInvalid('pay_level')"
                [class.is-valid]="isControlValid('pay_level')"
              >
                <option value="full">Full Card</option>
                <option value="half-card">Half Card</option>
                <option value="free-card">Free Card</option>
              </select>
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label"> Slip</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="file"
                accept=".png, .jpg, .jpeg"
                (change)="uploadFile('slip', $event)"
                formControlName="slip"
                [class.is-invalid]="isControlInvalid('slip')"
                [class.is-valid]="isControlValid('slip')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Student ID</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="student_id"
                placeholder="Please enter valid student id"
                [class.is-invalid]="isControlInvalid('student_id')"
                [class.is-valid]="isControlValid('student_id')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">
              Select Subject</label
            >
            <div class="col-lg-11 col-xl-9">
              <select
                class="form-control form-control-lg form-control-solid"
                name="course_id"
                formControlName="course_id"
                [class.is-invalid]="isControlInvalid('course_id')"
                [class.is-valid]="isControlValid('course_id')"
              >
                <option
                  *ngFor="let subject of subjectObj"
                  value="{{ subject.id }}"
                >
                  {{ subject.name_en }} - Rs. {{ subject.course_fee }}
                </option>
              </select>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-light btn-elevate mr-2"
      (click)="modal.dismiss()"
    >
      Cancel
    </button>
    <ng-container>
      <button
        type="submit"
        class="btn btn-primary btn-elevate"
        (click)="save()"
        [disabled]="formGroup.invalid"
      >
        Save
      </button>
    </ng-container>
  </div>
</div>
