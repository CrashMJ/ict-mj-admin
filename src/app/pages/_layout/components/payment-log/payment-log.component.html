<div class="card card-custom gutter-b">
  <div class="card-header">
    <div class="card-title">
      <h3 class="card-label">Payment List</h3>
    </div>
  </div>
  <div class="card-body">
    <div class="table-responsive angular-bootstrap-table">
      <mat-table #table2 [dataSource]="dataSource">
        <ng-container matColumnDef="id">
          <mat-header-cell *matHeaderCellDef>ID </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.id }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="payment_method">
          <mat-header-cell *matHeaderCellDef>Method </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.payment_method }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="payment_for">
          <mat-header-cell *matHeaderCellDef>FOR </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.payment_for }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="server_response">
          <mat-header-cell *matHeaderCellDef>Response </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.server_response }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="status">
          <mat-header-cell *matHeaderCellDef>Status </mat-header-cell>
          <mat-cell *matCellDef="let row">
            <mat-chip-list aria-label="">
              <mat-chip color="accent" *ngIf="row.status == 'APPROVED'" selected
                >APPROVED</mat-chip
              >
              <mat-chip color="" *ngIf="row.status == 'PENDING'" selected
                >PENDING</mat-chip
              >
              <mat-chip color="warn" *ngIf="row.status == 'REJECTED'" selected
                >REJECTED</mat-chip
              >
            </mat-chip-list>
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="created_at">
          <mat-header-cell *matHeaderCellDef>Created </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.created_at }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="action">
          <mat-header-cell *matHeaderCellDef>Action </mat-header-cell>
          <mat-cell *matCellDef="let row">
            <button
              mat-icon-button
              color="primary"
              type="button"
              [routerLink]="['/payment-log/edit', row.id]"
              matTooltip="Edit"
            >
              <mat-icon>create</mat-icon>
            </button>
          </mat-cell>
        </ng-container>
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
      </mat-table>
      <mat-paginator
        [length]="pagination_data.total"
        [pageSizeOptions]="pagination_item_counts"
        (page)="pageEvent($event)"
        showFirstLastButtons
      ></mat-paginator>
    </div>
  </div>
</div>
