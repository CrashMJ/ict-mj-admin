<div class="card card-custom gutter-b">
    <div class="card-header">
        <div class="card-title">
            <h3 class="card-label">Coupon List</h3>
        </div>
        <div class="card-toolbar">
            <a type="button" class="btn btn-primary" (click)="addNewCoupon()">New Coupon</a>
        </div>
    </div>
    <div class="col-lg-12 ml-5"style="width: 100%">
            <div class="row mt-2">
                <div class="col-lg-12">
                    <h4 class="card-label">Filter</h4>
                </div>
                <div class="col-lg-12 row">
                        <div class="col-lg-3">
                                <label class="col-form-label">ID </label>
                                <input class="form-control form-control-lg form-control-solid" name="id" #idSearch type="text" (keyup)="search('id',idSearch.value)" />
                            </div>
                   
               
                    <div class="col-lg-3">
                        <label class="col-form-label">Status </label>
                        <select class="form-control form-control-lg form-control-solid" name="status" #statusSearch
                        type="text" (change)="search('status',statusSearch.value)">
                        <option value=""></option>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="DISABLED">DISABLED</option>
                    </select>
                        <!-- <input class="form-control form-control-lg form-control-solid" type="text" name="status" #statusSearch type="text" (keyup)="search('status',statusSearch.value)"/> -->
                    </div>
                    <!-- <div class="col-lg-1">
                        <label class="col-form-label"></label>
                        <a type="button" class="btn form-control form-control-lg btn-primary button-bottom" (click)="addNewAdmin()">Filter</a>
                     </div> -->
                     <div class="col-lg-1 ml-1">
                        <label class="col-form-label"></label>
                        <a type="button" class="btn  form-control form-control-lg form-control-solid button-bottom" (click)="idSearch.value = '';statusSearch.value = '';clearFilter()">Clear</a>
                     </div>
                </div>
            </div>
        </div>
        
    <div class="card-body">
        <div class="table-responsive angular-bootstrap-table">
            <mat-table #table2 [dataSource]="dataSource">
				
                <ng-container matColumnDef="id">
                    <mat-header-cell *matHeaderCellDef>ID </mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        {{ row.id }}
                    </mat-cell>
                </ng-container>
                <ng-container matColumnDef="name">
                    <mat-header-cell *matHeaderCellDef>name </mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        {{ row.student.name }}
                    </mat-cell>
                </ng-container>
                <ng-container matColumnDef="type">
                    <mat-header-cell *matHeaderCellDef>Type </mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        {{ row.type}}
                    </mat-cell>
                </ng-container>
                <ng-container matColumnDef="usage_count">
                    <mat-header-cell *matHeaderCellDef>Usage Count </mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        {{ row.usage_count }}
                    </mat-cell>
                </ng-container>
                <ng-container matColumnDef="usage_left">
                    <mat-header-cell *matHeaderCellDef>Usage Left </mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        {{ row.usage_left }}
                    </mat-cell>
                </ng-container>
                <ng-container matColumnDef="date">
                        <mat-header-cell *matHeaderCellDef>Date </mat-header-cell>
                        <mat-cell *matCellDef="let row">
                            {{ row.created_at | date:'medium' }}
                        </mat-cell>
                    </ng-container>
                <ng-container matColumnDef="status">
                    <mat-header-cell *matHeaderCellDef>Status </mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        <mat-chip-list aria-label="">
                            <mat-chip color="accent" *ngIf="row.status == 'ACTIVE'" selected>ACTIVE</mat-chip>
                            <mat-chip color="warn" *ngIf="row.status == 'DISABLED'" selected>DISABLED</mat-chip>
                        </mat-chip-list>
                    </mat-cell>
                   
                </ng-container>
                <ng-container matColumnDef="action">
                    <mat-header-cell *matHeaderCellDef>Action </mat-header-cell>
                    <mat-cell *matCellDef="let row">
                        <button
                            mat-icon-button
                            color="primary"
                            type="button"
                            [routerLink]="['/coupon/edit', row.id]"
                            matTooltip="Edit"
                        >
                            <mat-icon>create</mat-icon></button
                        >&nbsp;
                        <button
                            mat-icon-button
                            color="warn"
                            type="button"
                            (click)="delete(row.id,row.code)"
                            matTooltip="Delete"
                        >
                            <mat-icon>delete</mat-icon>
                        </button>
                    </mat-cell>
                   
                </ng-container>
                <mat-header-row
                    *matHeaderRowDef="displayedColumns"
                ></mat-header-row>
                <mat-row
                    *matRowDef="let row; columns: displayedColumns"
                ></mat-row>
            </mat-table>
            <mat-paginator
            [length]="pagination_data.total"
            [pageSizeOptions]="pagination_item_counts"
            (page)="pageEvent($event)"
            showFirstLastButtons
        ></mat-paginator>
        </div>
       
    </div>
</div>
