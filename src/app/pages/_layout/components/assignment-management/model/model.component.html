<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4" id="example-modal-sizes-title-lg">
            <h3>ADD NEW INQUIRY</h3>
            <ng-container>
                <div [formGroup]="formGroup">

                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Student Name</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="student_name" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Student Phone</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="student_phone" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-form-label">Grade</label>
                        <div class="col-lg-9">
                            <select
							class="form-control"
							formControlName="class_grade"
							required
							placeholder="Select Grade"
                            [class.is-invalid]="isControlInvalid('class_grade')"
                            [class.is-valid]="isControlValid('class_grade')"
						>
                                <option value="">Select</option>
                                <option value="miner">Miner</option>
                                <option value="ol">O/L</option>
                                <option value="al">A/L</option>
						    </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Exam Year</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="exam_year" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Comment</label>
                        <div class="col-lg-11 col-xl-9">
                            <textarea class="form-control form-control-lg form-control-solid" type="text" rows="6" formControlName="comment"></textarea>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()">Cancel</button>
        <ng-container>

            <button type="submit" class="btn btn-primary btn-elevate" (click)="save()" [disabled]="formGroup.invalid">Save</button>
        </ng-container>
    </div>
</div>
