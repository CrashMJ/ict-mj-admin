<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4" id="example-modal-sizes-title-lg">
            <h3>ADD NEW MEDAL</h3>
            <ng-container>
                <!-- <ng-container >Edit</ng-container>
                  <ng-container >Create</ng-container>
                  customer -->
                <!-- <ng-container *ngIf="customer.id">'{{customer.firstName}} {{ customer.lastName }}'</ng-container> -->
                <div [formGroup]="formGroup">
                        <div class="form-group row">
                            <label class="col-xl-3 col-lg-3 col-form-label">Name</label>
                            <div class="col-lg-11 col-xl-9">
                                <input class="form-control form-control-lg form-control-solid" type="text"
                                    formControlName="name" [class.is-invalid]="isControlInvalid('name')"
                                    [class.is-valid]="isControlValid('name')" />
                            </div>
                        </div>
                        <div class="form-group row">
                            <label class="col-xl-3 col-lg-3 col-form-label">Medal Icon</label>
                            <div class="col-lg-11 col-xl-9">
                                <input class="form-control form-control-lg form-control-solid" type="file" accept=".png, .jpg, .jpeg" (change)="uploadFile('medal_image',$event)"/>
                            </div>
                    
                        </div>
                <!-- </div> -->
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Medal Card</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="file" accept=".png, .jpg, .jpeg" (change)="uploadFile('medal_card',$event)"/>
                        </div>
                
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">View</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="view" [class.is-invalid]="isControlInvalid('view')"
                                [class.is-valid]="isControlValid('view')" />
                        </div>
                    </div>
                    
                </div>
            </ng-container>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()">Cancel</button>
        <ng-container>

            <button type="submit" class="btn btn-primary btn-elevate" (click)="save()"
                [disabled]="formGroup.invalid">Save</button>
        </ng-container>
    </div>
</div>
