<!--begin::Card-->
<div class="card card-custom gutter-b">
    <!--begin::Header-->
    <div class="card-header card-header-tabs-line">
        <ul class="nav nav-dark nav-bold nav-tabs nav-tabs-line" role="tablist">
            <li class="nav-item">
                <a (click)="setActiveTab(1)" class="nav-link cursor-pointer" [ngClass]="getActiveTabCSSClass(1)"
                    role="tab">
                    Log
                </a>
            </li>
        </ul>
    </div>


    <div class="card-body">
        <div class="tab-content pt-3">
            <!-- begin::Header -->
            <div class="tab-pane" [ngClass]="getActiveTabCSSClass(1)">
                <div class="row">
                    
                    <div class="col-lg-10 ml-1"></div>
                    <div class="col-lg-1 ml-1">
                        <label class="col-form-label"></label>
                        <a type="button"
                            class="btn form-control form-control-lg form-control-solid button-bottom" (click)="retryFail()">Retry fail</a>
                    </div>
                </div>
                <div class="row">
                    <ngx-json-viewer [json]="log" [expanded]="false"></ngx-json-viewer>
                </div>

            </div>

        </div>
    </div>

    <!--end::Header-->
    <!--begin::Form-->
</div>
<!--end::Card-->
