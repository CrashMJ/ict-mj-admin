<div class="card card-custom gutter-b">
  <div class="card-header">
    <div class="card-title">
      <h3 class="card-label">Notification List</h3>
    </div>
    <div class="card-toolbar">
      <a type="button" class="btn btn-primary" (click)="addNewNotification()">New Notification</a>
    </div>
  </div>
  <div class="card-body">
    <div class="table-responsive angular-bootstrap-table">
      <mat-table #table2 [dataSource]="dataSource">
        <ng-container matColumnDef="id">
          <mat-header-cell *matHeaderCellDef>ID </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.id }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="title">
          <mat-header-cell *matHeaderCellDef>Title </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.title }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="message">
          <mat-header-cell *matHeaderCellDef>Message </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.msg }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="response">
          <mat-header-cell *matHeaderCellDef>Type </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.response }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="status">
          <mat-header-cell *matHeaderCellDef>Status </mat-header-cell>
          <mat-cell *matCellDef="let row">
            <mat-chip-list aria-label="">
              <mat-chip color="accent" *ngIf="row.status == 'active'" selected
                >ACTIVE</mat-chip
              >
            </mat-chip-list>
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="created_at">
          <mat-header-cell *matHeaderCellDef>Created </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.created_at }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="action">
          <mat-header-cell *matHeaderCellDef>Action </mat-header-cell>
          <mat-cell *matCellDef="let row">
           
          </mat-cell>
        </ng-container>
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
      </mat-table>
      <mat-paginator
        [length]="pagination_data.total"
        [pageSizeOptions]="pagination_item_counts"
        (page)="pageEvent($event)"
        showFirstLastButtons
      ></mat-paginator>
    </div>
  </div>
</div>
