<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4" id="example-modal-sizes-title-lg">
            <h3>ADD NEW BANNER</h3>
            <ng-container>
                <div [formGroup]="formGroup">
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Banner</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="file" accept=".png, .jpg, .jpeg" (change)="uploadFile('image',$event)"/>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Description</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="description" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">URL </label>
                        <div class="col-lg-11 col-xl-9 ">
                            <input class="form-control form-control-lg form-control-solid" type="text" formControlName="url" [class.is-invalid]="isControlInvalid('url')"
                                [class.is-valid]="isControlValid('url')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Status</label>
                        <div class="col-lg-11 col-xl-9">
                            <select class="form-control form-control-lg form-control-solid" name="status" formControlName="status" [class.is-invalid]="isControlInvalid('status')"
                                [class.is-valid]="isControlValid('status')">
                                <option value="ACTIVE">Active</option>
                                <option value="DISABLED">Disable</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Type</label>
                        <div class="col-lg-11 col-xl-9">
                            <select class="form-control form-control-lg form-control-solid" name="type" formControlName="type" [class.is-invalid]="isControlInvalid('type')"
                                [class.is-valid]="isControlValid('type')">
                                <option value="MAIN_BANNER">MAIN_BANNER</option>
                                <option value="LIVE_BANNER">LIVE_BANNER</option>
                                <option value="LIVE_DESKTOP_STATIC">LIVE_DESKTOP_STATIC</option>
                                <option value="LIVE_MOBILE_BANNER">LIVE_MOBILE_BANNER</option>
                                <option value="LIVE_MOBILE_STATIC">LIVE_MOBILE_STATIC</option>
                                <option value="VOD_BANNER">VOD_BANNER</option>
                                <option value="AFTER_ALS">AFTER_ALS</option>
                                <option value="AL_SQUAD">AL_SQUAD</option>
                            </select>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()">Cancel</button>
        <ng-container>
            <button type="submit" class="btn btn-primary btn-elevate" (click)="save()" [disabled]="formGroup.invalid || submitting"><span *ngIf="submitting">Processing...</span><span *ngIf="!submitting">Save</span> </button>
        </ng-container>
    </div>
</div>
