<div class="card card-custom gutter-b">
  <div class="card-header">
    <div class="card-title">
      <h3 class="card-label">Other resources</h3>
    </div>
  </div>

  <div class="col-lg-12 ml-5" style="width: 100%">
    <div class="row mt-2">
      <div class="col-lg-12">
        <h4 class="card-label">Filter</h4>
      </div>
      <div class="col-lg-12 row">
        <div class="col-lg-2">
          <label class="col-form-label">Class Type</label>
          <select
            class="form-control form-control-lg form-control-solid"
            name="class_type"
            #class_type
            (change)="search('class_type', class_type.value)"
          >
            <option value="null"></option>
            <option value="al">A/L</option>
            <option value="ol">O/L</option>
            <option value="miner">Miner</option>
          </select>
        </div>
        <div class="col-lg-2">
          <label class="col-form-label"> Class Grade</label>
          <select
            class="form-control form-control-lg form-control-solid"
            name="grade"
            #grade
            (change)="search('grade', grade.value)"
          >
            <option value="null"></option>
            <option value="grade6">Grade 6</option>
            <option value="grade7">Grade 7</option>
            <option value="grade8">Grade 8</option>
            <option value="grade9">Grade 9</option>
            <option value="grade10">Grade 10</option>
            <option value="grade11">Grade 11</option>
            <option value="grade12">Grade 12</option>
            <option value="grade13">Grade 13</option>
          </select>
        </div>
        <div class="col-lg-2">
          <label class="col-form-label"> Medium</label>
          <select
            class="form-control form-control-lg form-control-solid"
            name="medium"
            #medium
            (change)="search('medium', medium.value)"
          >
            <option value="null"></option>
            <option value="sinhala">Sinhala</option>
            <option value="tamil">Tamil</option>
            <option value="english">English</option>
          </select>
        </div>
        <div class="col-lg-2">
          <label class="col-form-label"> Type</label>
          <select
            class="form-control form-control-lg form-control-solid"
            name="type"
            #type
            (change)="search('type', type.value)"
          >
            <option value="null"></option>
            <option value="modal_papers">Modal Paper</option>
            <option value="past_papers">Past Paper</option>
          </select>
        </div>

        <div class="col-lg-1">
          <label class="col-form-label"></label>
          <a
            type="button"
            class="btn form-control form-control-lg form-control-solid button-bottom"
            (click)="
              class_type.value = '';
              grade.value = '';
              medium.value = '';
              type.value = '';
              clearFilter()
            "
            >Clear</a
          >
        </div>
        <!-- <div class="col-lg-2"></div> -->
        <div class="col-lg-1"></div>
        <div class="col-lg-2">
          <label class="col-form-label"></label>
          <a
            type="button"
            class="btn btn-primary button-bottom"
            (click)="addPayment()"
            >New Resource</a
          >
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <div class="table-responsive angular-bootstrap-table">
      <mat-table #table2 [dataSource]="dataSource">
        <ng-container matColumnDef="id">
          <mat-header-cell *matHeaderCellDef>ID </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.id }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="class_type">
          <mat-header-cell *matHeaderCellDef>Class </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.class_type }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="grade">
          <mat-header-cell *matHeaderCellDef>Grade </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.grade }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="medium">
          <mat-header-cell *matHeaderCellDef>Medium </mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.medium }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="url">
          <mat-header-cell *matHeaderCellDef>url</mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.url }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="type">
          <mat-header-cell *matHeaderCellDef>Type</mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.type }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="title">
          <mat-header-cell *matHeaderCellDef>Title</mat-header-cell>
          <mat-cell *matCellDef="let row">
            {{ row.title }}
          </mat-cell>
        </ng-container>
        <ng-container matColumnDef="action">
          <mat-header-cell *matHeaderCellDef>Action </mat-header-cell>
          <mat-cell *matCellDef="let row">
            <!-- <button
              mat-icon-button
              color="primary"
              type="button"
              [routerLink]="['/payments/edit', row.classPayment.id]"
              matTooltip="Edit"
            >
              <mat-icon>create</mat-icon></button
            >&nbsp; -->
            <button
              mat-icon-button
              color="warn"
              type="button"
              (click)="delete(row.id, row.title)"
              matTooltip="Delete"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </mat-cell>
        </ng-container>
        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
      </mat-table>
      <mat-paginator
        [length]="pagination_data.total"
        [pageSizeOptions]="pagination_item_counts"
        (page)="pageEvent($event)"
        showFirstLastButtons
      ></mat-paginator>
    </div>
  </div>
</div>
