<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4" id="example-modal-sizes-title-lg">
            <h3>ADD NEW CONTACT </h3>
            <ng-container>
                <!-- <ng-container >Edit</ng-container>
                  <ng-container >Create</ng-container>
                  customer -->
                <!-- <ng-container *ngIf="customer.id">'{{customer.firstName}} {{ customer.lastName }}'</ng-container> -->
                <div [formGroup]="formGroup">
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Name</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="name" [class.is-invalid]="isControlInvalid('name')"
                                [class.is-valid]="isControlValid('name')" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-xl-3  col-form-label">Email</label>
                        <div class="col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="email" [class.is-invalid]="isControlInvalid('email')"
                                [class.is-valid]="isControlValid('email')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3  col-form-label">Phone Number</label>
                        <div class="col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="phone" [class.is-invalid]="isControlInvalid('phone')"
                                [class.is-valid]="isControlValid('phone')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3  col-form-label">Subject</label>
                        <div class="col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="subject"
                                [class.is-invalid]="isControlInvalid('subject')"
                                [class.is-valid]="isControlValid('subject')" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Message </label>
                        <div class="col-lg-11 col-xl-9 ">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="message" [class.is-invalid]="isControlInvalid('message')"
                                [class.is-valid]="isControlValid('message')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Status</label>
                        <div class="col-lg-11 col-xl-9">
                            <select formControlName="status" class="form-control"
                                [class.is-invalid]="isControlInvalid('status')"
                                [class.is-valid]="isControlValid('status')">
                                <option disabled>Status</option>
                                <option value="ACTIVE">Active</option>
                                <option value="INACTIVE">Inactive</option>
                            </select>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()">Cancel</button>
        <ng-container>

            <button type="submit" class="btn btn-primary btn-elevate" (click)="save()"
                [disabled]="formGroup.invalid">Save</button>
        </ng-container>
    </div>
</div>
