<div class="modal-content">
  <div class="modal-header">
    <div class="modal-title h4" id="example-modal-sizes-title-lg">
      <h3>{{materialId ? "EDIT MATERIAL" : "ADD NEW MATERIAL" }}</h3>
      <ng-container>
        <!-- <ng-container >Edit</ng-container>
                      <ng-container >Create</ng-container>
                      customer -->
        <!-- <ng-container *ngIf="customer.id">'{{customer.firstName}} {{ customer.lastName }}'</ng-container> -->
        <div [formGroup]="formGroup">
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Title</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="title_en"
                [class.is-invalid]="isControlInvalid('title_en')"
                [class.is-valid]="isControlValid('title_en')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Description</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="description_en"
                [class.is-invalid]="isControlInvalid('description_en')"
                [class.is-valid]="isControlValid('description_en')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label">Module Id</label>
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="module_id"
                placeholder="Get module id from the modules tab and enter here. Only number"
                [class.is-invalid]="isControlInvalid('module_id')"
                [class.is-valid]="isControlValid('module_id')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label"
              >Google Drive URL</label
            >
            <div class="col-lg-11 col-xl-9">
              <input
                class="form-control form-control-lg form-control-solid"
                type="text"
                formControlName="url"
                placeholder="Paste google drive public url"
                [class.is-invalid]="isControlInvalid('url')"
                [class.is-valid]="isControlValid('url')"
              />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-xl-3 col-lg-3 col-form-label"> Type</label>
            <div class="col-lg-11 col-xl-9">
              <select
                class="form-control form-control-lg form-control-solid"
                name="type"
                formControlName="type"
                [class.is-invalid]="isControlInvalid('type')"
                [class.is-valid]="isControlValid('type')"
              >
                <option value="document">Document</option>
                <option value="exam">Exam</option>
                <option value="repeat-class">Repeat Class</option>
                <option value="recording">Recording</option>
              </select>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-light btn-elevate mr-2"
      (click)="modal.dismiss()"
    >
      Cancel
    </button>
    <ng-container>
      <button
        type="submit"
        class="btn btn-primary btn-elevate"
        (click)="save()"
        [disabled]="formGroup.invalid"
      >
      {{materialId ? "Update" : "Save" }}
      </button>
    </ng-container>
  </div>
</div>
