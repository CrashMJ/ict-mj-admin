<div class="modal-content">
    <div class="modal-header">
        <div class="modal-title h4" id="example-modal-sizes-title-lg">
            <h3>ADD NEW CAMPUS CONTACT</h3>
            <ng-container>
                <div [formGroup]="formGroup">
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Name</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="name" [class.is-invalid]="isControlInvalid('name')"
                                [class.is-valid]="isControlValid('name')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3  col-form-label">Email</label>
                        <div class="col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="email" [class.is-invalid]="isControlInvalid('email')"
                                [class.is-valid]="isControlValid('email')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-lg-3 col-form-label">Phone Number</label>
                        <div class="col-lg-11 col-xl-9">
                            <input class="form-control form-control-lg form-control-solid" type="text"
                                formControlName="phoneNumber" [class.is-invalid]="isControlInvalid('phoneNumber')"
                                [class.is-valid]="isControlValid('phoneNumber')" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-xl-3 col-form-label"> Option</label>
                        <div class="col-lg-11 col-xl-9">
                            <select class="form-control form-control-lg form-control-solid" name="after_al_option_id"
                                formControlName="after_al_option_id"
                                [class.is-invalid]="isControlInvalid('after_al_option_id')"
                                [class.is-valid]="isControlValid('after_al_option_id')">
                                <option *ngFor="let item of optionObj" [value]="item.id">{{item.id}}</option>
                            </select>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-light btn-elevate mr-2" (click)="modal.dismiss()">Cancel</button>
        <ng-container>

            <button type="submit" class="btn btn-primary btn-elevate" (click)="save()"
                [disabled]="formGroup.invalid">Save</button>
        </ng-container>
    </div>
</div>
